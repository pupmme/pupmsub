name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build linux-amd64
        env:
          CGO_ENABLED: 0
          GOSUMDB: off
        run: |
          go build -mod=mod -ldflags '-w -s' -o pupmsub-linux-amd64 .
          ls -la pupmsub-linux-amd64
          file pupmsub-linux-amd64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: pupmsub-linux-amd64
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
