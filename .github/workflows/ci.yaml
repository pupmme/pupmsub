name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build (mod=mod, direct proxy)
        run: |
          set -e
          # direct proxy bypasses the Go module proxy cache
          # needed for sagernet pseudo-version deps (v0.0.0-yyyymmddhhmmss-xxxxxxxx)
          GOSUMDB=off GOPROXY=https://proxy.golang.org,direct go build -mod=mod ./... 2>&1

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
