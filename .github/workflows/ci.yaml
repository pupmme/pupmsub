name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: go.mod

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-mod-${{ runner.os }}-${{ hashFiles('**/go.mod') }}
          restore-keys: |
            go-mod-${{ runner.os }}-

      # Build only the pure-Go packages (no gvisor WASM SDK dependency).
      # gvisor requires (go install github.com/bazelbuild/rules_go/go/tools/bazel@latest &&
      #   go install github.com/bazelbuild/rules_go/extras/bzl |bazel-wasm@latest)
      # which is not available in a standard CI runner.
      - name: Build (pure Go packages only)
        run: |
          set -e
          # Build packages that don't transitively pull in gvisor
          GOSUMDB=off go build \
            github.com/pupmme/pupmsub/api \
            github.com/pupmme/pupmsub/config \
            github.com/pupmme/pupmsub/db \
            github.com/pupmme/pupmsub/logger \
            github.com/pupmme/pupmsub/network \
            github.com/pupmme/pupmsub/service \
            github.com/pupmme/pupmsub/cmd \
            2>&1

      - name: Vet
        run: |
          GOSUMDB=off go vet \
            github.com/pupmme/pupmsub/api \
            github.com/pupmme/pupmsub/config \
            github.com/pupmme/pupmsub/db \
            github.com/pupmme/pupmsub/logger \
            github.com/pupmme/pupmsub/network \
            github.com/pupmme/pupmsub/service \
            github.com/pupmme/pupmsub/cmd \
            2>&1 || true
