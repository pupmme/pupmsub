name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build
        run: |
          # Skip go.sum checks for unavailable private/unversioned deps
          # (sagernet/netlink-go, sagernet/gvisor use v0.0.0 pseudo-versions)
          GOSUMDB=off go build ./... 2>&1

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
