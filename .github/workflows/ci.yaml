name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: go.mod

      - name: Syntax check (gofmt)
        run: |
          # Check formatting (warn only, don't fail)
          set +e
          FMT_ISSUES=$(gofmt -l .)
          set -e
          if [ -n "$FMT_ISSUES" ]; then
            echo "::warning::Formatting issues found:"
            echo "$FMT_ISSUES"
          fi
          echo "Syntax check complete"

      - name: Build syntax only (no link)
        run: |
          # Build without linking (check syntax only)
          # This avoids gvisor/WASM SDK issues
          GOSUMDB=off go build -n ./... 2>&1 | head -50

      - name: Build (full compile)
        run: |
          echo "=== go mod download ==="
          GOSUMDB=off go mod download 2>&1
          echo "=== go build ==="
          GOSUMDB=off go build -v ./... 2>&1

      - name: Vet (best effort)
        run: GOSUMDB=off go vet ./... 2>&1 || echo "Vet skipped due to deps"
        continue-on-error: true
